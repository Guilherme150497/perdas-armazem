<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perdas · Revenda Ambev - Cobeb</title>
<style>
  :root{
    --ink:#0B0F14;
    --amber:#F5A623;
    --paper:#F3EFE6;
    --steel:#8891A0;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .stage{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:64px 24px;
  }

  .content{
    text-align:center;
    width:100%;
    max-width:640px;
  }

  .eyebrow{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:18px;
  }

  h1{
    margin:0;
    font-family:"Arial Black","Helvetica Neue",Arial,sans-serif;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:-0.01em;
    font-size:clamp(30px,5.4vw,52px);
    line-height:1.02;
    color:var(--paper);
  }

  .links{
    margin-top:56px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
    max-width:480px;
    margin-left:auto;
    margin-right:auto;
  }

  a.item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:inherit;
    padding:30px 16px;
    border-radius:16px;
    border:1px solid rgba(243,239,230,0.14);
    background:rgba(255,255,255,0.03);
    transition:transform .2s ease, border-color .2s ease, background .2s ease;
  }
  a.item:hover, a.item:focus-visible{
    transform:translateY(-4px);
    border-color:var(--amber);
    background:rgba(255,255,255,0.06);
  }
  a.item:focus-visible{outline:2px solid var(--amber); outline-offset:3px;}

  .icon{
    width:46px;
    height:46px;
    border-radius:50%;
    border:1.5px solid var(--amber);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--amber);
  }
  .icon svg{width:22px;height:22px;}

  .item span{
    font-size:14px;
    font-weight:600;
    letter-spacing:0.01em;
    color:var(--paper);
    line-height:1.35;
  }

  @media (max-width:520px){
    .links{grid-template-columns:1fr; max-width:280px;}
    a.item{flex-direction:row; justify-content:flex-start; padding:16px 18px;}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="content">
    <div class="eyebrow">Revenda Ambev · Cobeb</div>
    <h1>Perdas &amp; Prejuízo</h1>

    <div class="links">
      <a class="item" href="https://guilherme150497.github.io/dashboard-prejuizo/" target="_blank" rel="noopener">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>
        </span>
        <span>Pacote de<br>Prejuízo</span>
      </a>

      <a class="item" href="https://benevolent-seahorse-f329ec.netlify.app/" target="_blank" rel="noopener">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 3.5"/></svg>
        </span>
        <span>Painel de Perdas<br>— Armazém</span>
      </a>
    </div>
  </div>
</div>

</body>
</html>
